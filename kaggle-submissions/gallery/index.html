<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NeuroGolf Submission Gallery</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #ffffff;
      --text: #172033;
      --muted: #5b6475;
      --border: #d9dee8;
      --soft: #f6f8fb;
      --accent: #17345f;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 16px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    main {
      width: min(960px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }
    header {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      background: linear-gradient(180deg, #f9fbff 0%, #ffffff 100%);
      margin-bottom: 24px;
    }
    h1 {
      margin: 0 0 8px;
      color: var(--accent);
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.15;
      letter-spacing: -0.03em;
    }
    p {
      margin: 0;
      color: var(--muted);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid var(--border);
      background: #fff;
    }
    th,
    td {
      border: 1px solid var(--border);
      padding: 10px 12px;
      text-align: left;
      vertical-align: top;
    }
    th {
      background: var(--soft);
      font-weight: 650;
      color: var(--accent);
    }
    a {
      color: #154fa3;
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }
    footer {
      margin-top: 28px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>NeuroGolf Submission Gallery</h1>
      <p>Built submission report pages, sorted newest first.</p>
    </header>

    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>#</th>
          <th>Milestone</th>
          <th>pass_all</th>
          <th>Kaggle score</th>
          <th>Page</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>2026-06-17</td>
          <td>4</td>
          <td>M9</td>
          <td>70</td>
          <td>915.03</td>
          <td><a href="../2026-06-17/submission-4/page.html">View page</a></td>
        </tr>
      </tbody>
    </table>

    <footer>
      Generated by NeuroGolf automation
    </footer>
  </main>
</body>
</html>
