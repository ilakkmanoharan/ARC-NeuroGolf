# Post-submit: poll Kaggle every 10 min (up to ~3h), fetch logs, commit to repo.
#
# Required secrets: KAGGLE_USERNAME + KAGGLE_KEY  (or KAGGLE_API_TOKEN)
#
# Trigger: Actions → NeuroGolf post-submit → Run workflow
#   Also chained automatically from neurogolf-loop.yml

name: NeuroGolf post-submit

on:
  workflow_dispatch:
    inputs:
      auto_detect:
        description: Auto-detect latest submitted submission (ignore date/number below)
        type: boolean
        default: true
      date:
        description: Submission date folder (YYYY-MM-DD) — only if auto_detect=false
        required: false
        default: ""
      submission_number:
        description: Submission number to fetch logs for — only if auto_detect=false
        required: false
        default: ""
      message:
        description: Kaggle message substring (optional; reads results.json)
        required: false
        default: ""
      skip_initial_wait:
        description: Skip 10 min initial wait (use if submission was already graded)
        type: boolean
        default: false
      auto_commit:
        description: Commit logs and status back to main
        type: boolean
        default: true
      trigger_cursor_agent:
        description: Launch Cursor Cloud Agent after logs land
        type: boolean
        default: true
  workflow_call:
    inputs:
      date:
        required: true
        type: string
      submission_number:
        required: true
        type: string
      message:
        required: false
        type: string
        default: ""
      skip_initial_wait:
        required: false
        type: boolean
        default: false
      auto_commit:
        required: false
        type: boolean
        default: true
      trigger_cursor_agent:
        required: false
        type: boolean
        default: true

permissions:
  contents: write

env:
  KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
  KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
  KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
  PYTHON_VERSION: "3.11"

jobs:
  post-submit:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - run: pip install -r requirements.txt

      - name: Resolve submission (continuous lane)
        id: lane
        env:
          AUTO_DETECT: ${{ inputs.auto_detect }}
          INPUT_DATE: ${{ inputs.date }}
          INPUT_SUB: ${{ inputs.submission_number }}
        run: |
          set -euo pipefail
          if [ "${AUTO_DETECT}" = "true" ] || [ -z "${INPUT_DATE}" ] || [ -z "${INPUT_SUB}" ]; then
            eval "$(python scripts/submission_lane.py --export-latest-submitted)"
            echo "Auto-detected: ${DATE} submission-${SUB_NUM}"
          else
            DATE="${INPUT_DATE}"
            SUB_NUM="${INPUT_SUB}"
            echo "Manual: ${DATE} submission-${SUB_NUM}"
          fi
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"
          echo "submission_number=${SUB_NUM}" >> "$GITHUB_OUTPUT"

      - name: Configure Kaggle CLI
        run: bash scripts/setup_kaggle_auth.sh

      - name: Unzip submission ONNX if needed
        env:
          DATE: ${{ steps.lane.outputs.date }}
          SUB_NUM: ${{ steps.lane.outputs.submission_number }}
        run: |
          set -euo pipefail
          SUB_DIR="kaggle-submissions/${DATE}/submission-${SUB_NUM}"
          if [ -f "${SUB_DIR}/submission_v2.zip" ]; then
            mkdir -p "${SUB_DIR}/submission"
            unzip -q -o "${SUB_DIR}/submission_v2.zip" -d "${SUB_DIR}/submission" || true
          fi

      - name: Wait for Kaggle grade and fetch logs
        id: fetch
        continue-on-error: true
        env:
          KAGGLE_BIN: kaggle
        run: |
          set -euo pipefail
          ARGS=(
            --date "${{ steps.lane.outputs.date }}"
            --submission "${{ steps.lane.outputs.submission_number }}"
          )
          if [ -n "${{ inputs.message }}" ]; then
            ARGS+=(--message "${{ inputs.message }}")
          fi
          if [ "${{ inputs.skip_initial_wait }}" = "true" ]; then
            ARGS+=(--skip-initial-wait)
          fi
          SUB_DIR="kaggle-submissions/${{ steps.lane.outputs.date }}/submission-${{ steps.lane.outputs.submission_number }}"
          if python3 scripts/post_submit_fetch.py "${ARGS[@]}"; then
            exit 0
          fi
          if [ -f "${SUB_DIR}/results.json" ] && python3 -c "import json; r=json.load(open('${SUB_DIR}/results.json')); exit(0 if r.get('kaggle_score_actual') else 1)"; then
            echo "Falling back to local-only log fetch"
            python3 scripts/post_submit_fetch.py "${ARGS[@]}" --local-only --skip-initial-wait
          else
            exit 1
          fi

      - name: Commit post-submit artifacts
        if: inputs.auto_commit == true && steps.fetch.outcome == 'success'
        env:
          DATE: ${{ steps.lane.outputs.date }}
          SUB_NUM: ${{ steps.lane.outputs.submission_number }}
        run: |
          set -euo pipefail
          SUB_DIR="kaggle-submissions/${DATE}/submission-${SUB_NUM}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${SUB_DIR}/kaggle_status.txt" "${SUB_DIR}/results.json" 2>/dev/null || true
          git add "${SUB_DIR}/kaggle_logs/" 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          git commit -m "ci: post-submit logs submission-${SUB_NUM} (${DATE})" \
            -m "Kaggle grade + per-task logs via neurogolf-post-submit workflow."
          git push

      - name: Trigger Cursor Cloud Agent (next submission)
        if: |
          always() &&
          inputs.trigger_cursor_agent == true &&
          (steps.fetch.outcome == 'success' || steps.fetch.outcome == 'failure')
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          pip install -q -r requirements-ci.txt 2>/dev/null || pip install -q cursor-sdk
          python scripts/trigger_cursor_agent.py \
            --mode agent1

      - uses: actions/upload-artifact@v4
        with:
          name: post-submit-${{ steps.lane.outputs.date }}-s${{ steps.lane.outputs.submission_number }}
          path: |
            kaggle-submissions/${{ steps.lane.outputs.date }}/submission-${{ steps.lane.outputs.submission_number }}/kaggle_logs/**
            kaggle-submissions/${{ steps.lane.outputs.date }}/submission-${{ steps.lane.outputs.submission_number }}/kaggle_status.txt
            kaggle-submissions/${{ steps.lane.outputs.date }}/submission-${{ steps.lane.outputs.submission_number }}/results.json
          retention-days: 30
          if-no-files-found: warn
